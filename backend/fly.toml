# Tokyo — 한국에서 가장 가까운 리전
app = "typers-api"
primary_region = "nrt"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1  # cold start 방지

[env]
  HTTPS = "true"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
